name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: yggdrasil
          POSTGRES_USER: yggdrasil
          POSTGRES_PASSWORD: local_development_only
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U yggdrasil -d yggdrasil" --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4.2-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 5s --health-retries 20
      qdrant:
        image: qdrant/qdrant:v1.9.0
        ports:
          - 6333:6333
        options: --health-cmd "wget -qO- http://127.0.0.1:6333/healthz" --health-interval 5s --health-timeout 5s --health-retries 20

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://yggdrasil:local_development_only@127.0.0.1:5432/yggdrasil
      REDIS_URL: redis://127.0.0.1:6379/0
      QDRANT_URL: http://127.0.0.1:6333

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: snok/install-poetry@v1
        with:
          version: 2.3.4
          virtualenvs-create: true
          virtualenvs-in-project: true
      - run: poetry install --with dev --no-interaction
      - run: poetry run black --check app ../tests
      - run: poetry run ruff check app ../tests
      - run: poetry run mypy app ../tests
      - run: poetry run alembic upgrade head
      - run: poetry run alembic downgrade -1
      - run: poetry run alembic upgrade head
      - run: poetry run python ../tools/verify_test_seed_data.py
      - run: poetry run pytest -c pyproject.toml --cov=app --cov-report=term-missing ../tests
      - run: poetry run pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker compose build backend frontend

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
